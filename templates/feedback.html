<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь | Климатолог</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f7f0; font-family: 'Segoe UI', Roboto, sans-serif; color: #1e2f2e; line-height: 1.4; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
        .back-link { display: inline-block; margin-bottom: 2rem; background: #e0f0e4; padding: 0.6rem 1.2rem; border-radius: 40px; text-decoration: none; color: #1f6e43; font-weight: 600; }
        .back-link i { margin-right: 6px; }
        .back-link:hover { background: #c8e0cf; }
        h1 { font-size: 2rem; color: #1d4d2d; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .form-card { background: white; border-radius: 32px; padding: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c5e3f; }
        input, textarea { width: 100%; padding: 0.8rem; border: 1px solid #d9eadf; border-radius: 24px; font-family: inherit; font-size: 1rem; }
        textarea { min-height: 120px; resize: vertical; }
        button { background: #2b8c5e; color: white; border: none; padding: 0.8rem 2rem; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1f6e43; }
        .flash { padding: 1rem; border-radius: 24px; margin-bottom: 1.5rem; }
        .flash.success { background: #d4edda; color: #155724; border-left: 5px solid #28a745; }
        .flash.error { background: #f8d7da; color: #721c24; border-left: 5px solid #dc3545; }
        .footer { margin-top: 2rem; text-align: center; color: #235b3a; }
    </style>
</head>
<body>
<div class="container">
    <a href="{{ url_for('index') }}" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
    <h1><i class="fas fa-envelope"></i> Обратная связь</h1>
    <div class="form-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Сообщение</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit">Отправить</button>
        </form>
    </div>
    <div class="footer">
        <i class="fas fa-leaf"></i> Спасибо, что помогаете бороться с изменением климата
    </div>
</div>
</body>
</html>
